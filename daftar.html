<div class="auth-container" id="register-page">
    <h2 style="color: var(--gold); text-align: center;">DAFTAR KONTRIBUTOR</h2>
    <p style="text-align: center; font-size: 12px;">Bantu sesama cari kerja dan dapatkan koin tunai!</p>
    
    <form class="auth-form">
        <label>Nama Lengkap</label>
        <input type="text" placeholder="Masukkan nama sesuai KTP/Bank" required>
        
        <label>Username</label>
        <input type="text" placeholder="Untuk login" required>
        
        <label>Nomor WhatsApp</label>
        <input type="number" placeholder="08xxxxxxxxxx" required>
        
        <label>Password</label>
        <input type="password" placeholder="Minimal 6 karakter" required>
        
        <button type="submit" class="btn" style="width: 100%; margin-top: 15px; padding: 10px;">DAFTAR SEKARANG</button>
    </form>
</div>
